name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Build verification (runs on every push to any branch) ──────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # No real key needed for build — proxy is server-side only
          OPENAI_API_KEY: ''

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Deploy to Render (runs only on push to main after build passes) ─────────
  deploy:
    name: Deploy → Render
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # To activate:
        # 1. Go to your Render service → Settings → Deploy Hooks → Create hook
        # 2. Add the hook URL as a GitHub repo secret named RENDER_DEPLOY_HOOK_URL
        # 3. Push to main — Render will auto-pull and redeploy
